  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Helvetica', 'Arial', 'sans-serif'],
            display: ['Helvetica', 'Arial', 'sans-serif'],
          },
          colors: {
            iosBlue: '#9333ea',
            iosOrange: '#14b8a6',
            appleGray: '#FBFBFD',
            brand: {
              primary: '#9333ea',
              secondary: '#14b8a6',
              light: '#faf5ff',
            },
          },
          borderRadius: {
            'ios': '2.5rem',
          },
          animation: {
            'fade-up': 'fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-down': 'fadeDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'fade-in': 'fadeIn 1s ease-out forwards',
            'float': 'float 6s ease-in-out infinite',
            'scale-in': 'scaleIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-soft': 'pulseSoft 4s ease-in-out infinite',
          },
          keyframes: {
            fadeUp: {
              '0%': { opacity: '0', transform: 'translateY(40px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeDown: {
              '0%': { opacity: '0', transform: 'translateY(-40px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            scaleIn: {
              '0%': { opacity: '0', transform: 'scale(0.95)' },
              '100%': { opacity: '1', transform: 'scale(1)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.8' },
            },
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Helvetica', 'Arial', sans-serif;

      overflow-x: hidden;
    }

    .glass {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
    }

    .ios-shadow {
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.04);
    }

    .btn-ios-blue {
      background-color: #9333ea;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-ios-blue:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 24px rgba(147, 51, 234, 0.3);
    }

    .btn-ios-orange {
      background-color: #14b8a6;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-ios-orange:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 24px rgba(20, 184, 166, 0.3);
    }

    .ios-card {
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ios-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
    }

    /* Mobile text scaling adjustments - Refined for better readability */
    @media (max-width: 640px) {

        /* Slightly smaller for better fit */
      }

      .section-padding {
        padding-top: 3rem;

        padding-bottom: 3rem;
      }
    }
  </style>
